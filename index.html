
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
#con{max-width:480px;margin:0 auto;height:700px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;background:var(--color-background-tertiary)}
.stickyh{position:sticky;top:0;z-index:50;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary)}
.hdr{padding:10px 14px;display:flex;align-items:center;gap:8px}
.htitle{font-size:15px;font-weight:500;flex:1}
.tpill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);cursor:pointer}
.tdot{width:8px;height:8px;border-radius:50%}
.tpname{font-size:12px;font-weight:500;color:var(--color-text-primary);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sco{font-size:13px;font-weight:500;color:var(--color-text-warning)}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{flex:1;padding:8px 2px;font-size:11px;font-weight:500;text-align:center;border:none;background:none;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font-sans);line-height:1.3}
.tab.on{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.notif{margin:8px 14px 0;padding:8px 12px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;display:none}
.notif.ok{background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);display:block}
.notif.er{background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);display:block}
.tc{padding:14px}
.pane{display:none}.pane.on{display:block}
.lbl{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.pa{background:var(--color-background-secondary);border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;margin-bottom:12px;position:relative;overflow:hidden;text-align:center;padding:16px}
.pa img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pabar{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:flex-end;padding:6px 8px;background:linear-gradient(transparent,rgba(0,0,0,.4))}
input[type=file]{display:none}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.tbtn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 3px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:9px;font-weight:500;color:var(--color-text-secondary);font-family:var(--font-sans);line-height:1.2;text-align:center}
.tbtn.on{background:var(--color-background-info);border:1px solid var(--color-border-info);color:var(--color-text-info)}
.ti{font-size:18px}
.zg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.zbtn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px 3px;font-size:9px;font-weight:500;text-align:center;cursor:pointer;color:var(--color-text-secondary);font-family:var(--font-sans);line-height:1.3}
.zbtn.on{background:var(--color-background-info);border:1px solid var(--color-border-info);color:var(--color-text-info)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-bottom:10px}
.srow{display:flex;align-items:center;gap:8px;margin:6px 0 3px}
.srow input{flex:1}
.snum{font-size:18px;font-weight:500;min-width:20px;text-align:center}
.shint{font-size:10px;color:var(--color-text-secondary);text-align:center;margin-top:3px}
textarea{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);font-family:var(--font-sans);font-size:13px;padding:8px 10px;resize:none;outline:none;margin-bottom:10px}
textarea:focus{border-color:var(--color-border-primary)}
.aibox{background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-lg);padding:11px;margin-bottom:10px;display:none}
.aibox.on{display:block}
.aihdr{font-size:10px;font-weight:500;color:var(--color-text-info);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.aitxt{font-size:12px;line-height:1.6;color:var(--color-text-primary)}
.hi{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px;margin-bottom:7px;display:flex;gap:9px}
.hth{width:48px;height:48px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.hth img{width:100%;height:100%;object-fit:cover}
.hin{flex:1;min-width:0}
.hty{font-size:9px;color:var(--color-text-secondary);margin-bottom:2px;font-weight:500}
.hde{font-size:12px;color:var(--color-text-primary);line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:3px}
.hme{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:9px;color:var(--color-text-secondary)}
.bdg{display:inline-flex;align-items:center;padding:1px 5px;border-radius:8px;font-size:9px;font-weight:500}
.bs{background:var(--color-background-success);color:var(--color-text-success)}
.bw{background:var(--color-background-warning);color:var(--color-text-warning)}
.bd{background:var(--color-background-danger);color:var(--color-text-danger)}
.bpt{font-weight:500;color:var(--color-text-warning)}
.lbc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.lr{font-size:16px;min-width:26px;text-align:center;font-weight:500}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.li{flex:1;min-width:0}
.ln{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.lm{font-size:11px;color:var(--color-text-secondary)}
.ls{font-size:20px;font-weight:500}
.lbr{height:3px;background:var(--color-background-secondary);border-radius:2px;margin-top:4px;overflow:hidden}
.lbbar{height:100%;border-radius:2px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.mz{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 4px;text-align:center;cursor:pointer;position:relative}
.mzi{font-size:18px;margin-bottom:2px}
.mzn{font-size:9px;font-weight:500;color:var(--color-text-secondary);line-height:1.2}
.mzb{position:absolute;top:3px;right:3px;min-width:14px;height:14px;border-radius:7px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 2px}
.zh{border-color:var(--color-border-danger);background:var(--color-background-danger)}.zh .mzn{color:var(--color-text-danger)}
.zm{border-color:var(--color-border-warning);background:var(--color-background-warning)}.zm .mzn{color:var(--color-text-warning)}
.zl{border-color:var(--color-border-success);background:var(--color-background-success)}.zl .mzn{color:var(--color-text-success)}
.rout{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px;font-size:12px;line-height:1.8;max-height:380px;overflow-y:auto;margin-bottom:10px;white-space:pre-wrap;color:var(--color-text-primary)}
.setup{min-height:700px;display:flex;flex-direction:column;justify-content:center;padding:24px 16px;background:var(--color-background-tertiary)}
.sh{font-size:24px;font-weight:500;text-align:center;margin-bottom:5px;color:var(--color-text-primary)}
.ss{font-size:13px;color:var(--color-text-secondary);text-align:center;line-height:1.6;margin-bottom:22px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.tbtn2{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:14px 10px;text-align:center;cursor:pointer;font-family:var(--font-sans)}
.te{font-size:26px;margin-bottom:4px}
.tn{font-size:13px;font-weight:500}
.tc2{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.empty{text-align:center;padding:28px 12px;color:var(--color-text-secondary);font-size:13px;line-height:1.6}
.div{height:0.5px;background:var(--color-border-tertiary);margin:13px 0}
.dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:currentColor;animation:dt 1.2s infinite;vertical-align:middle}
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes dt{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}
select{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);font-size:13px;padding:8px 10px;outline:none;font-family:var(--font-sans);margin-bottom:10px}
.btn{width:100%;padding:12px;border:none;border-radius:var(--border-radius-lg);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.btnp{background:var(--color-text-primary);color:var(--color-background-primary)}
.btns{background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary)}
.btni{background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info)}
</style>

<div id="con">

<!-- SETUP -->
<div id="setup" class="setup">
  <div style="font-size:40px;text-align:center;margin-bottom:10px">🦺</div>
  <div class="sh">안전 탐정단</div>
  <div class="ss">학교 주변을 탐방하며 위험요소를 발견하고<br>팀 점수를 획득하세요!</div>
  <div class="lbl">소속 팀 선택</div>
  <div class="tgrid" id="setupGrid"></div>
  <button class="btn btnp" id="startBtn" onclick="confirmTeam()" style="opacity:.35;pointer-events:none;margin-bottom:10px">활동 시작 →</button>
  <button class="btn btns" onclick="demoAndStart()" style="font-size:12px">✨ 데모 모드로 체험하기</button>
  <p style="text-align:center;font-size:10px;color:var(--color-text-secondary);margin-top:12px">하나의 기기에서 전체 팀 관리 가능</p>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="stickyh">
    <div class="hdr">
      <div class="htitle">🦺 안전 탐정단</div>
      <div class="tpill" onclick="goSetup()">
        <div class="tdot" id="hDot" style="background:#888"></div>
        <span class="tpname" id="hTeam">팀 선택</span>
      </div>
      <div class="sco" id="hScore">0pt</div>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab-s" onclick="sw('s')">📍<br>제보</button>
      <button class="tab" id="tab-m" onclick="sw('m')">🗺<br>지도</button>
      <button class="tab" id="tab-r" onclick="sw('r')">🏆<br>순위</button>
      <button class="tab" id="tab-p" onclick="sw('p')">📊<br>보고서</button>
    </div>
  </div>
  <div id="notif" class="notif"></div>
  <div class="tc">

    <!-- SUBMIT -->
    <div class="pane on" id="pane-s">
      <div class="lbl" style="margin-bottom:10px">위험요소 제보</div>
      <div class="pa" id="photoArea" onclick="document.getElementById('fi').click()">
        <div style="font-size:28px;opacity:.4">📷</div>
        <p style="font-size:11px;color:var(--color-text-secondary);line-height:1.4">사진을 찍거나 갤러리에서 선택</p>
        <input type="file" id="fi" accept="image/*" capture="environment" onchange="handlePhoto(this)">
      </div>
      <div class="lbl">위험 유형</div>
      <div class="tg" id="typeGrid"></div>
      <div class="lbl">발견 구역</div>
      <div class="zg" id="zoneGrid"></div>
      <div class="card">
        <div class="lbl" style="margin-bottom:5px">위험도 평가</div>
        <div class="srow">
          <span style="font-size:10px;color:var(--color-text-secondary)">낮음</span>
          <input type="range" min="1" max="5" value="3" id="sevS" oninput="updateSev(this.value)">
          <span style="font-size:10px;color:var(--color-text-secondary)">높음</span>
          <span class="snum" id="sevN">3</span>
        </div>
        <div class="shint" id="sevH">중간 위험 — 주의가 필요합니다</div>
      </div>
      <div class="lbl">상황 설명</div>
      <textarea id="descA" rows="3" placeholder="발견한 위험요소를 자세히 설명하세요..."></textarea>
      <button class="btn btni" id="aiBtn" onclick="getAI()" style="margin-bottom:10px">🤖 AI 개선방안 제안받기</button>
      <div class="aibox" id="aiBox">
        <div class="aihdr">AI 안전 개선 제안</div>
        <div class="aitxt" id="aiTxt"></div>
      </div>
      <button class="btn btnp" onclick="submitH()" style="margin-bottom:10px">🚨 위험요소 제보하기</button>
      <div class="div"></div>
      <div class="lbl">내 팀 제보 현황</div>
      <div id="myList"></div>
    </div>

    <!-- MAP -->
    <div class="pane" id="pane-m">
      <div class="lbl" style="margin-bottom:10px">캠퍼스 안전 지도</div>
      <div class="mg" id="mapGrid"></div>
      <div class="div"></div>
      <div class="lbl" id="mapLbl">전체 위험 목록</div>
      <div id="mapList"></div>
    </div>

    <!-- RANK -->
    <div class="pane" id="pane-r">
      <div class="lbl" style="margin-bottom:10px">실시간 팀 순위</div>
      <div id="lbList"></div>
      <div class="div"></div>
      <div class="lbl">전체 제보 내역</div>
      <div id="allList"></div>
    </div>

    <!-- REPORT -->
    <div class="pane" id="pane-p">
      <div class="lbl" style="margin-bottom:10px">발표용 자동 보고서</div>
      <div class="card" style="margin-bottom:10px">
        <div class="lbl" style="margin-bottom:6px">보고서 대상</div>
        <select id="repSel"></select>
        <button class="btn btnp" onclick="genReport()">📊 AI 보고서 생성</button>
      </div>
      <div id="repOut"></div>
    </div>

  </div>
</div>
</div>

<script>
const TEAMS=[
  {id:1,name:'번개팀',icon:'⚡',color:'#E24B4A'},
  {id:2,name:'방패팀',icon:'🛡',color:'#378ADD'},
  {id:3,name:'독수리팀',icon:'🦅',color:'#639922'},
  {id:4,name:'철벽팀',icon:'🏰',color:'#BA7517'},
];
const TYPES=[
  {id:'fall',i:'🪜',n:'추락·전도'},{id:'elec',i:'⚡',n:'전기위험'},
  {id:'fire',i:'🔥',n:'화재·폭발'},{id:'trap',i:'⚙️',n:'끼임·절단'},
  {id:'chem',i:'☠️',n:'화학물질'},{id:'exit',i:'🚪',n:'비상구'},
  {id:'feq',i:'🧯',n:'소방설비'},{id:'ppe',i:'⛑️',n:'보호구'},
  {id:'etc',i:'⚠️',n:'기타위험'},
];
const ZONES=[
  {id:'front',i:'🏫',n:'정문 앞'},{id:'park',i:'🚗',n:'주차장'},
  {id:'gym',i:'🏃',n:'체육관'},{id:'lec',i:'📚',n:'강의동'},
  {id:'plaza',i:'🌳',n:'중앙광장'},{id:'lab',i:'🔬',n:'실험실'},
  {id:'back',i:'🚪',n:'후문'},{id:'cafe',i:'🍽',n:'식당'},
  {id:'mach',i:'🔧',n:'기계실'},
];
const SDESC=['','경미한 위험','주의 필요','중간 위험 — 주의가 필요합니다','심각한 위험','매우 심각 — 즉시 조치 필요'];
const SPTS=[0,10,10,20,30,30];
const MEDALS=['🥇','🥈','🥉','4'];
const S={team:null,selTeam:null,hazards:[],type:null,zone:null,photo:null,curTab:'s',mapZone:null};

function init(){
  renderSetup();
  document.getElementById('typeGrid').innerHTML=TYPES.map(t=>`<button class="tbtn" id="ty${t.id}" onclick="selT('${t.id}')" ><span class="ti">${t.i}</span>${t.n}</button>`).join('');
  document.getElementById('zoneGrid').innerHTML=ZONES.map(z=>`<button class="zbtn" id="zo${z.id}" onclick="selZ('${z.id}')">${z.i} ${z.n}</button>`).join('');
  updateSev(3);
  updateRepSel();
}

function renderSetup(){
  document.getElementById('setupGrid').innerHTML=TEAMS.map(t=>`
    <div class="tbtn2" id="st${t.id}" onclick="pickT(${t.id})" style="border-color:${t.color}33">
      <div class="te">${t.icon}</div>
      <div class="tn" style="color:${t.color}">${t.name}</div>
      <div class="tc2">${S.hazards.filter(h=>h.tid===t.id).length}건 제보</div>
    </div>`).join('');
}

function pickT(id){
  S.selTeam=id;
  const t=TEAMS.find(x=>x.id===id);
  document.querySelectorAll('.tbtn2').forEach(e=>{e.style.borderWidth='0.5px';e.style.background='var(--color-background-primary)'});
  const el=document.getElementById('st'+id);
  el.style.borderColor=t.color;el.style.borderWidth='2px';el.style.background=t.color+'15';
  const b=document.getElementById('startBtn');b.style.opacity='1';b.style.pointerEvents='auto';
}

function confirmTeam(){
  if(!S.selTeam)return;
  S.team=TEAMS.find(t=>t.id===S.selTeam);
  showApp();
}

function demoAndStart(){
  loadDemo();
  S.selTeam=1;S.team=TEAMS[0];
  showApp();
}

function showApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  updateHdr();renderAll();
  notify(`${S.team.icon} ${S.team.name} 활동 시작! 🔥`);
}

function goSetup(){
  document.getElementById('app').style.display='none';
  document.getElementById('setup').style.display='flex';
  renderSetup();
}

function updateHdr(){
  if(!S.team)return;
  document.getElementById('hDot').style.background=S.team.color;
  document.getElementById('hTeam').textContent=S.team.name;
  document.getElementById('hScore').textContent=teamScore(S.team.id)+'pt';
}

function teamScore(id){return S.hazards.filter(h=>h.tid===id).reduce((s,h)=>s+h.pts,0)}

let nTimer;
function notify(msg,err=false){
  const n=document.getElementById('notif');
  n.textContent=msg;n.className='notif '+(err?'er':'ok');
  clearTimeout(nTimer);nTimer=setTimeout(()=>n.className='notif',3500);
}

function sw(name){
  document.querySelectorAll('.pane').forEach(e=>e.className='pane');
  document.querySelectorAll('.tab').forEach(e=>e.className='tab');
  document.getElementById('pane-'+name).className='pane on';
  document.getElementById('tab-'+name).className='tab on';
  S.curTab=name;
  if(name==='m')renderMap();
  if(name==='r'){renderLB();renderAllList();}
  document.getElementById('con').scrollTop=0;
}

function selT(id){S.type=id;document.querySelectorAll('.tbtn').forEach(e=>e.className='tbtn');document.getElementById('ty'+id).className='tbtn on'}
function selZ(id){S.zone=id;document.querySelectorAll('.zbtn').forEach(e=>e.className='zbtn');document.getElementById('zo'+id).className='zbtn on'}

function updateSev(v){
  const c=['','var(--color-text-success)','var(--color-text-success)','var(--color-text-warning)','var(--color-text-danger)','var(--color-text-danger)'];
  document.getElementById('sevN').textContent=v;document.getElementById('sevN').style.color=c[v];
  document.getElementById('sevH').textContent=SDESC[v];
}

function handlePhoto(input){
  const f=input.files[0];if(!f)return;
  const url=URL.createObjectURL(f);S.photo=url;
  const a=document.getElementById('photoArea');
  a.innerHTML=`<img src="${url}" alt=""><div class="pabar"><button onclick="event.stopPropagation();clearPh()" style="background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:12px;padding:2px 9px;font-size:10px;cursor:pointer">다시 찍기</button></div><input type="file" id="fi" accept="image/*" capture="environment" onchange="handlePhoto(this)">`;
}

function clearPh(){
  S.photo=null;
  const a=document.getElementById('photoArea');
  a.innerHTML=`<div style="font-size:28px;opacity:.4">📷</div><p style="font-size:11px;color:var(--color-text-secondary);line-height:1.4">사진을 찍거나 갤러리에서 선택</p><input type="file" id="fi" accept="image/*" capture="environment" onchange="handlePhoto(this)">`;
  a.onclick=()=>document.getElementById('fi').click();
}

async function getAI(){
  const desc=document.getElementById('descA').value.trim();
  const type=S.type?TYPES.find(t=>t.id===S.type):null;
  if(!desc&&!type){notify('위험 유형과 설명을 먼저 입력하세요!',true);return;}
  const btn=document.getElementById('aiBtn');
  btn.disabled=true;btn.innerHTML='🤖 AI 분석 중... <span class="dots"><span></span><span></span><span></span></span>';
  const aiBox=document.getElementById('aiBox');const aiTxt=document.getElementById('aiTxt');
  aiBox.className='aibox on';aiTxt.innerHTML='<span class="dots"><span></span><span></span><span></span></span>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,
        messages:[{role:'user',content:`산업안전 전문가로서 아래 위험요소를 분석하고 개선방안을 제시해주세요.\n위험유형: ${type?type.n:'미선택'}\n상황: ${desc||'(없음)'}\n\n형식:\n🔍 위험 분석: (2문장)\n⚡ 즉각 조치: (2가지)\n🛡 예방 방안: (2가지)\n📋 관련법령: (산안법 조항 1개)\n\n학생 발표에 적합하게 간결하게 작성`}]})});
    const d=await res.json();aiTxt.innerHTML=d.content[0].text.replace(/\n/g,'<br>');
  }catch(e){aiTxt.textContent='연결 오류. 직접 개선방안을 입력해주세요.';}
  btn.disabled=false;btn.innerHTML='🤖 AI 개선방안 재생성';
}

function submitH(){
  if(!S.team){notify('먼저 팀을 선택해주세요!',true);goSetup();return;}
  if(!S.type){notify('위험 유형을 선택해주세요!',true);return;}
  if(!S.zone){notify('발견 구역을 선택해주세요!',true);return;}
  const desc=document.getElementById('descA').value.trim();
  if(!desc){notify('상황 설명을 입력해주세요!',true);return;}
  const sev=parseInt(document.getElementById('sevS').value);
  const hasAI=document.getElementById('aiBox').classList.contains('on');
  const aiText=document.getElementById('aiTxt').textContent;
  const validAI=hasAI&&aiText.length>20;
  const t=TYPES.find(x=>x.id===S.type);const z=ZONES.find(x=>x.id===S.zone);
  const pts=SPTS[sev]+(validAI?5:0);
  S.hazards.push({id:Date.now(),tid:S.team.id,tname:S.team.name,ticon:S.team.icon,tcolor:S.team.color,photo:S.photo,type:S.type,ticon2:t.i,tname2:t.n,zone:S.zone,zicon:z.i,zname:z.n,sev,desc,improve:validAI?aiText:null,pts,ts:new Date()});
  clearPh();S.type=null;S.zone=null;
  document.querySelectorAll('.tbtn').forEach(e=>e.className='tbtn');
  document.querySelectorAll('.zbtn').forEach(e=>e.className='zbtn');
  document.getElementById('descA').value='';
  document.getElementById('sevS').value=3;updateSev(3);
  document.getElementById('aiBox').className='aibox';
  document.getElementById('aiBtn').innerHTML='🤖 AI 개선방안 제안받기';
  updateHdr();renderAll();
  notify(`🎯 ${pts}점 획득! 훌륭한 발견입니다!`);
  setTimeout(()=>sw('r'),2000);
}

    {tid:2,tname:'방패팀',ticon:'🛡',tcolor:'#378ADD',type:'feq',ticon2:'🧯',tname2:'소방설비',zone:'cafe',zicon:'🍽',zname:'식당',sev:2,desc:'식당 비치 소화기 유효기간 1년 초과.',pts:15,photo:null,improve:null},

    {tid:4,tname:'철벽팀',ticon:'🏰',tcolor:'#BA7517',type:'fire',ticon2:'🔥',tname2:'화재·폭발',zone:'back',zicon:'🚪',zname:'후문',sev:2,desc:'후문 인근 쓰레기 무단 투기. 화재 위험.',pts:10,photo:null,improve:null},

function renderAll(){renderMyList();if(S.curTab==='m')renderMap();if(S.curTab==='r'){renderLB();renderAllList();}updateRepSel();}

function hItem(h){
  const bc=h.sev>=4?'bd':h.sev>=3?'bw':'bs';
  const sl=h.sev>=4?'고위험':h.sev>=3?'중위험':'저위험';
  return`<div class="hi"><div class="hth">${h.photo?`<img src="${h.photo}" alt="">`:`<span>${h.ticon2}</span>`}</div><div class="hin"><div class="hty">${h.ticon2} ${h.tname2} · ${h.zicon} ${h.zname}</div><div class="hde">${h.desc}</div><div class="hme"><span class="bdg ${bc}">${sl}${h.sev}</span><span class="bpt">+${h.pts}pt</span><span>${h.ticon} ${h.tname}</span></div></div></div>`;
}

function renderMyList(){
  const el=document.getElementById('myList');
  const list=S.team?S.hazards.filter(h=>h.tid===S.team.id).reverse():[];
  el.innerHTML=list.length?list.map(hItem).join(''):`<div class="empty"><div style="font-size:32px;margin-bottom:8px">🔍</div>아직 제보가 없어요.<br>학교 주변을 탐방해보세요!</div>`;
}

function renderMap(){
  const grid=document.getElementById('mapGrid');
  grid.innerHTML=ZONES.map(z=>{
    const hz=S.hazards.filter(h=>h.zone===z.id);
    const ms=hz.length?Math.max(...hz.map(h=>h.sev)):0;
    const cls=ms>=4?'zh':ms>=3?'zm':ms>0?'zl':'';
    const bc=ms>=4?'var(--color-background-danger)':ms>=3?'var(--color-background-warning)':'var(--color-background-success)';
    const tc=ms>=4?'var(--color-text-danger)':ms>=3?'var(--color-text-warning)':'var(--color-text-success)';
    return`<div class="mz ${cls}" onclick="showZ('${z.id}')">${hz.length?`<div class="mzb" style="background:${bc};color:${tc}">${hz.length}</div>`:''}<div class="mzi">${z.i}</div><div class="mzn">${z.n}</div></div>`;
  }).join('');
  showZ(S.mapZone);
}

function showZ(id){
  S.mapZone=id;
  const el=document.getElementById('mapList');const lbl=document.getElementById('mapLbl');
  const hz=id?S.hazards.filter(h=>h.zone===id):S.hazards;
  const z=id?ZONES.find(z=>z.id===id):null;
  lbl.textContent=z?`${z.i} ${z.n} (${hz.length}건)`:`전체 위험 목록 (${hz.length}건)`;
  el.innerHTML=hz.length?hz.map(hItem).join(''):'<div class="empty">이 구역에는 위험요소가 없어요 ✅</div>';
}

function renderLB(){
  const ranked=TEAMS.map(t=>({...t,score:teamScore(t.id),cnt:S.hazards.filter(h=>h.tid===t.id).length})).sort((a,b)=>b.score-a.score);
  const max=Math.max(...ranked.map(t=>t.score),1);
  document.getElementById('lbList').innerHTML=ranked.map((t,i)=>{
    const isMe=S.team&&S.team.id===t.id;
    return`<div class="lbc${isMe?' ':{}}}" style="${isMe?`border:1.5px solid ${t.color}`:''}"><div class="lr">${MEDALS[i]}</div><div class="ldot" style="background:${t.color}"></div><div class="li"><div class="ln">${t.icon} ${t.name}${isMe?' ← 내 팀':''}</div><div class="lm">${t.cnt}개 제보</div><div class="lbr"><div class="lbbar" style="width:${Math.round(t.score/max*100)}%;background:${t.color}"></div></div></div><div class="ls" style="color:${t.color}">${t.score}</div></div>`;
  }).join('');
}

function renderAllList(){
  const el=document.getElementById('allList');
  el.innerHTML=S.hazards.length?[...S.hazards].reverse().map(hItem).join(''):'<div class="empty">아직 제보된 위험요소가 없어요</div>';
}

function updateRepSel(){
  document.getElementById('repSel').innerHTML='<option value="all">📋 전체 팀 종합</option>'+TEAMS.map(t=>`<option value="${t.id}">${t.icon} ${t.name}</option>`).join('');
}

async function genReport(){
  const tid=document.getElementById('repSel').value;
  const hz=tid==='all'?S.hazards:S.hazards.filter(h=>h.tid==tid);
  if(!hz.length){notify('제보된 위험요소가 없습니다!',true);return;}
  const ro=document.getElementById('repOut');
  ro.innerHTML=`<div class="rout"><span class="dots"><span></span><span></span><span></span></span> AI 보고서 작성 중...</div>`;
  const summary=hz.map((h,i)=>`${i+1}. [${h.tname2}] ${h.zname} / 위험도${h.sev} / ${h.desc}`).join('\n');
  const tLabel=tid==='all'?'전체 팀 종합':TEAMS.find(t=>t.id==tid)?.name;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        messages:[{role:'user',content:`산업안전 수업 현장 탐방 보고서를 작성해주세요.\n제목: ${tLabel}\n발견 ${hz.length}건:\n${summary}\n\n형식:\n📋 현장 안전 탐방 보고서 — ${tLabel}\n\n📊 탐방 결과 요약\n(핵심 수치와 발견사항)\n\n⚠️ 주요 위험요소 분석\n(가장 심각한 3건 분석)\n\n🏗 위험 유형별 현황\n(유형별 분류)\n\n💡 개선 권고사항\n(우선순위별 3가지)\n\n📚 관련 법령\n(산업안전보건법 조항 1-2개)\n\n🎯 결론\n(2문장)\n\n학생 발표에 적합하게 간결하게 작성`}]})});
    const d=await res.json();const text=d.content[0].text;
    ro.innerHTML=`<div class="rout">${text.replace(/\n/g,'<br>')}</div><button class="btn btns" onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(text)}')).then(()=>notify('📋 보고서 복사 완료!'))">📋 보고서 복사</button>`;
  }catch(e){ro.innerHTML='<div class="rout" style="color:var(--color-text-danger)">보고서 생성 실패. 다시 시도해주세요.</div>';}
}

init();
</script>
